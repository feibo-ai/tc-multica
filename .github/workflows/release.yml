name: Release

on:
  push:
    tags:
      # GitHub Actions uses glob patterns here, not regex. Match versioned
      # tags broadly at the trigger layer, then enforce strict semver below.
      - "v*.*.*"
      - "!v*-dirty*"

permissions:
  contents: write
  packages: write
  pull-requests: read # mini-ADR v4 invariant #7: verify job 查 PR 合并/评审态做 release 门

jobs:
  verify:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.release_meta.outputs.tag_name }}
      is_stable: ${{ steps.release_meta.outputs.is_stable }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag name
        id: release_meta
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          echo "Triggered by tag: $tag"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release tags must look like vX.Y.Z or vX.Y.Z-suffix; got '$tag'."
            exit 1
          fi
          if [[ "$tag" == *-dirty* ]]; then
            echo "::error::Refusing to release from dirty tag '$tag'."
            exit 1
          fi
          echo "tag_name=$tag" >> "$GITHUB_OUTPUT"
          if [[ "$tag" == *-* ]]; then
            echo "is_stable=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_stable=true" >> "$GITHUB_OUTPUT"
          fi

      # mini-ADR v4 invariant #7 / §1.4 — provenance 合并门:
      # tag 指向的 commit 必须是【合并入 main 的 PR 的 merge_commit_sha】,且该 PR 在其 head
      # 有 ≥1 条不同【人类】APPROVED review(排除 PR author / 本次 pusher / 任何 bot)。
      # 把「签名/发版只在 1 人评审的合并态发生」从约定变成 CI 硬门(堵单成员 push tag 投毒)。
      # 注:这是发布流程变更——release tag 必须打在已评审合并的 main commit 上。
      - name: Enforce review-merged-main provenance gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_SHA: ${{ github.sha }}
          PUSHER: ${{ github.actor }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          # 找 merge_commit_sha == tag commit 且已合并入 main 的 PR
          prs="$(gh api "repos/$REPO/commits/$TAG_SHA/pulls" \
            -H 'Accept: application/vnd.github+json' \
            --jq '[.[] | select(.merged_at != null and .base.ref == "main" and .merge_commit_sha == "'"$TAG_SHA"'")]')"
          if [ "$(echo "$prs" | jq 'length')" -eq 0 ]; then
            echo "::error::tag commit $TAG_SHA 不是任何【已合并入 main 的 PR】的 merge_commit_sha — 拒绝发版/签名(invariant #7)。"
            echo "::error::release tag 必须打在经 ≥1 人评审、已合并 main 的 commit 上。"
            exit 1
          fi
          num="$(echo "$prs" | jq -r '.[0].number')"
          author="$(echo "$prs" | jq -r '.[0].user.login')"
          head_sha="$(echo "$prs" | jq -r '.[0].head.sha')"
          # 该 PR head 上的 APPROVED review,去重 login,排 author/pusher/bot
          approvers="$(gh api "repos/$REPO/pulls/$num/reviews" --paginate \
            --jq '[.[] | select(.state=="APPROVED" and .commit_id=="'"$head_sha"'") | .user.login] | unique')"
          clean="$(echo "$approvers" | jq -r --arg a "$author" --arg p "$PUSHER" \
            '[.[] | select(. != $a and . != $p and (endswith("[bot]") | not))]')"
          cnt="$(echo "$clean" | jq 'length')"
          echo "PR #$num · author=$author · head=$head_sha · 有效 approvers($cnt): $(echo "$clean" | jq -c .)"
          if [ "$cnt" -lt 1 ]; then
            echo "::error::PR #$num 在 head 缺 ≥1 条不同人类 APPROVED(已排 author/pusher/bot)— 拒绝发版/签名(invariant #7)。"
            exit 1
          fi
          echo "✓ provenance 门通过:tag commit = ≥1 人评审合并入 main 的 PR head。"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Run tests
        run: cd server && go test ./...

  release:
    needs: verify
    # Builds the multica CLI binaries and attaches them to the GitHub Release
    # for the tag. Runs on every repo (including the feibo-ai deploy fork) so
    # each fork hosts its own CLI artifacts. The Homebrew-tap publish is gated
    # to the canonical upstream via PUBLISH_HOMEBREW (forks lack the tap token;
    # see .goreleaser.yml `brews.skip_upload`), so a fork release no longer 401s.
    runs-on: ubuntu-latest
    permissions:
      contents: write # GoReleaser 上传 release 资产 + gh release upload 吊销表
      packages: write
      id-token: write # OIDC — attest-build-provenance keyless 签名(无长期私钥)
      attestations: write # 写 provenance attestation
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          # Publish the Homebrew formula only from the canonical upstream;
          # forks build the CLI + GitHub Release but skip the tap upload.
          PUBLISH_HOMEBREW: ${{ github.repository_owner == 'multica-ai' }}

      # mini-ADR v4 invariant #8 stage-4 — 吊销表 revocations.json(仓根)是 daemon
      # 应用任何二进制 / skill bundle 前必查的 CI 签吊销表。把它复制进 dist/ 以便和
      # release 工件用【同一个】Attest build provenance 签(二进制锚 = feibo-ai/
      # tc-multica + release.yml + refs/tags/v*),daemon 用内置 sigstore 信任根离线
      # 验签该表本身后才信任其内容(绝不信未签的吊销表)。
      - name: Stage revocations.json into dist for attestation
        run: cp revocations.json dist/revocations.json

      # mini-ADR v4 ⑨ stage-2a — keyless OIDC build-provenance attestation:
      # 给 release 工件签 provenance(GitHub OIDC,无长期私钥)。下游(stage-2b/⑩c/
      # stage-4)update.go / daemon 用内置 sigstore 信任根离线验:OIDC subject 三元组
      # (repo==feibo-ai/tc-multica AND workflow==release.yml AND ref=~refs/tags/v*)
      # 全等才放行(invariant #2),拒 upstream 同名工件 + 未签/降级 fail-closed(invariant #3)。
      # revocations.json 与 dist/* 同锚(stage-4 吊销表也由本 workflow 签)。
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
            dist/revocations.json

      # 把吊销表上传为 release 资产(daemon 的 CheckArtifactRevocation 从 latest
      # release 拉 revocations.json)。--clobber 让重跑覆盖既有同名资产。
      - name: Upload revocations.json to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.verify.outputs.tag_name }}
        run: gh release upload "$TAG" dist/revocations.json --clobber

  # Multi-arch images are built natively per platform on dedicated runners
  # (amd64 on ubuntu-latest, arm64 on ubuntu-24.04-arm) and merged into a
  # manifest list. This avoids QEMU emulation, which was making the Next.js
  # arm64 build run for 30+ minutes per release.
  docker-backend-build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runs-on: ubuntu-latest
          - platform: linux/arm64
            runs-on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs-on }}
    steps:
      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute backend image labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/multica-backend
          labels: |
            org.opencontainers.image.title=Multica Backend
            org.opencontainers.image.description=Multica self-hosted backend

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          pull: true
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=release-backend-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=release-backend-${{ env.PLATFORM_PAIR }}
          build-args: |
            VERSION=${{ needs.verify.outputs.tag_name }}
            COMMIT=${{ github.sha }}
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/multica-backend,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-backend-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-backend-merge:
    needs: [verify, docker-backend-build]
    runs-on: ubuntu-latest
    concurrency:
      group: release-docker-backend-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-backend-*
          merge-multiple: true

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute backend image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/multica-backend
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest,enable=${{ needs.verify.outputs.is_stable == 'true' }}
            type=raw,value=${{ needs.verify.outputs.tag_name }}
            type=sha,prefix=sha-

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ github.repository_owner }}/multica-backend@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect \
            ghcr.io/${{ github.repository_owner }}/multica-backend:${{ steps.meta.outputs.version }}

  docker-web-build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runs-on: ubuntu-latest
          - platform: linux/arm64
            runs-on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs-on }}
    steps:
      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute web image labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/multica-web
          labels: |
            org.opencontainers.image.title=Multica Web
            org.opencontainers.image.description=Multica self-hosted web frontend

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          pull: true
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=release-web-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=release-web-${{ env.PLATFORM_PAIR }}
          build-args: |
            REMOTE_API_URL=http://backend:8080
            NEXT_PUBLIC_APP_VERSION=${{ needs.verify.outputs.tag_name }}
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/multica-web,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-web-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-web-merge:
    needs: [verify, docker-web-build]
    runs-on: ubuntu-latest
    concurrency:
      group: release-docker-web-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-web-*
          merge-multiple: true

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute web image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/multica-web
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest,enable=${{ needs.verify.outputs.is_stable == 'true' }}
            type=raw,value=${{ needs.verify.outputs.tag_name }}
            type=sha,prefix=sha-

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ github.repository_owner }}/multica-web@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect \
            ghcr.io/${{ github.repository_owner }}/multica-web:${{ steps.meta.outputs.version }}

  # Lockstep deploy: once BOTH images are pushed, point the two Zeabur prebuilt
  # services at the new tag in one step so frontend + backend always move
  # together. Runs only where the deploy vars are configured (the deploy repo);
  # upstream / forks without ZEABUR_ENV_ID skip it. See deploy/zeabur/README.md.
  deploy-zeabur:
    needs: [verify, docker-backend-merge, docker-web-merge]
    if: ${{ vars.ZEABUR_ENV_ID != '' && vars.ZEABUR_PROJECT_ID != '' && needs.verify.outputs.is_stable == 'true' }}
    runs-on: ubuntu-latest
    steps:
      # Needed so the deploy script (deploy/zeabur/deploy.sh) is on disk.
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zeabur CLI
        run: |
          curl -fsSL -o zeabur \
            https://github.com/zeabur/cli/releases/download/v0.18.0/zeabur_0.18.0_linux_amd64
          chmod +x zeabur
          sudo mv zeabur /usr/local/bin/zeabur

      # Resolve each service by --id (name lookup fails non-interactively) and
      # fail loudly on any CLI error — the zeabur CLI exits 0 even when it
      # prints ERROR, which silently no-op'd the v0.4.5 deploy. See deploy.sh.
      # NOTE: "backend"/"frontend" are the Zeabur SERVICE names (not the GHCR
      # image names multica-backend/multica-web above); deploy.sh bumps the
      # image tag on those services, which Zeabur then ships.
      - name: Lockstep deploy backend + frontend to ${{ needs.verify.outputs.tag_name }}
        env:
          ZEABUR_TOKEN: ${{ secrets.ZEABUR_TOKEN }}
          PROJECT_ID: ${{ vars.ZEABUR_PROJECT_ID }}
          ENV_ID: ${{ vars.ZEABUR_ENV_ID }}
          TAG: ${{ needs.verify.outputs.tag_name }}
        run: bash deploy/zeabur/deploy.sh backend frontend

  # Build the Desktop installers for Linux and Windows and upload them to
  # the GitHub Release that the `release` job above just published. macOS
  # Desktop continues to ship via the manual `release-desktop` skill so it
  # can be signed + notarized with Apple Developer credentials that are
  # not (yet) wired into CI.
  desktop:
    needs: release
    # Desktop installers ship from the canonical upstream only; the deploy fork
    # hosts just the CLI binaries from the `release` job above.
    if: github.repository_owner == 'multica-ai'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
          - os: windows-latest
            target: win
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install rpmbuild (Linux)
        if: matrix.target == 'linux'
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Package Desktop installers (${{ matrix.target }})
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # electron-builder's GitHub publisher reads this:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Disable code signing on Linux/Windows for now — the public
          # release is unsigned for these platforms, the CLI carries the
          # trust boundary. Set CSC_LINK in repo secrets to enable
          # Windows signing later.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: node scripts/package.mjs --${{ matrix.target }} --x64 --arm64 --publish always
